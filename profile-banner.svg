  <text x="120" y="336" fill="#F2EEF5" fill-opacity="0.92" font-family="Segoe UI, Arial, sans-serif" font-size="28">Offensive Security Consultant</text>
  <text x="120" y="394" fill="#F2EEF5" fill-opacity="0.76" font-family="Segoe UI, Arial, sans-serif" font-size="24">Red teaming, web and API exploitation, cloud attack paths, and</text>
  <text x="120" y="430" fill="#F2EEF5" fill-opacity="0.76" font-family="Segoe UI, Arial, sans-serif" font-size="24">leadership-ready remediation for high-risk environments.</text>
