    <rect x="682" y="478" width="90" height="42" rx="21" fill="#1A121B" stroke="#FF8A5A" stroke-opacity="0.45"/>
    <text x="711" y="505" fill="#FFF4F7" font-family="ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, Liberation Mono, monospace" font-size="18">cloud</text>
