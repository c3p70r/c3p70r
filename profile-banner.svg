  <text x="904" y="392" fill="#FFF4F7" font-family="Segoe UI, Arial, sans-serif" font-size="22">[04] Remediation handoff</text>
  <defs>
    <radialGradient id="bgGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(236 66) rotate(32.5797) scale(843.266 540.66)">
      <stop stop-color="#FF4D6D" stop-opacity="0.30"/>
      <stop offset="0.54" stop-color="#FF8A5A" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#050507" stop-opacity="0"/>
