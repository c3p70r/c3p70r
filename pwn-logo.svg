<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Pwn-inspired profile logo</title>
  <desc id="desc">Dark circular offensive security logo with a breach mark and terminal prompt symbol.</desc>
  <defs>
    <radialGradient id="bg" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(132 96) rotate(39.7) scale(470)">
      <stop stop-color="#3A161E"/>
      <stop offset="0.45" stop-color="#130F17"/>
      <stop offset="1" stop-color="#090A0E"/>
    </radialGradient>
    <linearGradient id="stroke" x1="112" y1="92" x2="408" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5B6E"/>
      <stop offset="1" stop-color="#FFB067"/>
    </linearGradient>
    <linearGradient id="prompt" x1="168" y1="162" x2="344" y2="344" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5B6E"/>
      <stop offset="1" stop-color="#FFC98C"/>
    </linearGradient>
    <filter id="softGlow" x="76" y="76" width="360" height="360" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="10" result="effect1_foregroundBlur"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="128" fill="#0B0C10"/>
  <circle cx="256" cy="256" r="214" fill="url(#bg)"/>
  <circle cx="256" cy="256" r="214" stroke="url(#stroke)" stroke-opacity="0.25" stroke-width="2"/>
  <circle cx="256" cy="256" r="188" stroke="#F8D4B4" stroke-opacity="0.08" stroke-width="1.5"/>

  <path d="M80 256H432" stroke="#FF6B78" stroke-opacity="0.10" stroke-width="1"/>
  <path d="M256 80V432" stroke="#FF6B78" stroke-opacity="0.10" stroke-width="1"/>
  <circle cx="256" cy="256" r="112" stroke="#FF8E73" stroke-opacity="0.08" stroke-width="1"/>

  <g filter="url(#softGlow)">
    <path d="M188 172L250 236L188 300" stroke="url(#prompt)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M280 320H344" stroke="url(#prompt)" stroke-width="28" stroke-linecap="round"/>
  </g>

  <path d="M176 136L210 112L234 132L258 102L286 126L314 98L340 124" stroke="url(#stroke)" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M156 358L194 394" stroke="#FFB067" stroke-opacity="0.8" stroke-width="8" stroke-linecap="round"/>
  <path d="M356 156L390 122" stroke="#FF5B6E" stroke-opacity="0.8" stroke-width="8" stroke-linecap="round"/>

  <circle cx="388" cy="122" r="10" fill="#FF5B6E"/>
  <circle cx="194" cy="394" r="10" fill="#FFB067"/>

  <path d="M136 182C152 148 181 121 216 106" stroke="#FFF1E3" stroke-opacity="0.16" stroke-width="5" stroke-linecap="round"/>
  <path d="M378 326C363 360 334 389 296 405" stroke="#FFF1E3" stroke-opacity="0.16" stroke-width="5" stroke-linecap="round"/>
</svg>
